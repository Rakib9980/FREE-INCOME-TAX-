<!DOCTYPE html>
<html lang="bn">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>এলিট আর্নিং প্রো - টেলিগ্রাম এডিশন</title>
    <script src="https://telegram.org/js/telegram-web-app.js"></script>
    <style>
        :root {
            --primary: #FFD700;
            --accent: #00f2fe;
            --bg: #080a0c;
            --glass: rgba(255, 255, 255, 0.08);
        }

        * { box-sizing: border-box; -webkit-tap-highlight-color: transparent; }
        
        body { 
            background: var(--bg); color: white; 
            font-family: 'Segoe UI', Roboto, sans-serif; 
            margin: 0; height: 100vh; display: flex; justify-content: center;
            overflow: hidden; user-select: none;
        }

        .app-frame {
            width: 100%; max-width: 430px; height: 100vh;
            background: linear-gradient(180deg, #10141d 0%, #000 100%);
            display: flex; flex-direction: column; padding: 20px;
            position: relative; border: 1px solid #222;
        }

        /* অটো প্রোফাইল কার্ড */
        .profile-card {
            background: var(--glass);
            backdrop-filter: blur(15px);
            padding: 15px; border-radius: 24px;
            border: 1px solid rgba(255,255,255,0.1);
            display: flex; justify-content: space-between; align-items: center;
            margin-bottom: 25px;
        }

        .user-meta { display: flex; align-items: center; gap: 12px; }
        .avatar { 
            width: 50px; height: 50px; 
            border-radius: 50%; border: 2px solid var(--primary);
            overflow: hidden; background: #222;
            display: flex; justify-content: center; align-items: center;
        }
        .avatar img { width: 100%; height: 100%; object-fit: cover; }

        /* ব্যালেন্স বোর্ড */
        .balance-board { text-align: center; margin-bottom: 30px; }
        .balance-title { font-size: 12px; color: #888; letter-spacing: 2px; text-transform: uppercase; }
        .balance-val { 
            font-size: 45px; font-weight: 900; 
            background: linear-gradient(to bottom, #fff, #ffd700);
            -webkit-background-clip: text; -webkit-text-fill-color: transparent;
        }
        .level-badge { 
            background: var(--accent); color: #000; padding: 4px 12px; 
            border-radius: 20px; font-size: 12px; font-weight: bold; margin-top: 5px; display: inline-block;
        }

        /* মেইন কয়েন সেকশন */
        .main-tap-area { flex-grow: 1; display: flex; justify-content: center; align-items: center; position: relative; }
        .coin-wrapper {
            width: 250px; height: 250px;
            background: radial-gradient(circle, rgba(255,215,0,0.15) 0%, transparent 70%);
            display: flex; justify-content: center; align-items: center;
        }
        .real-coin {
            width: 210px; height: 210px;
            background: url('https://cdn-icons-png.flaticon.com/512/2489/2489756.png') center/cover;
            background-color: #ffd700; border-radius: 50%;
            border: 8px solid #b8860b; cursor: pointer;
            box-shadow: 0 0 40px rgba(255,215,0,0.2), inset 0 0 15px rgba(255,255,255,0.5);
            transition: transform 0.05s;
        }
        .real-coin:active { transform: scale(0.92); }

        /* এনার্জি ড্যাশবোর্ড */
        .status-container { background: var(--glass); padding: 15px; border-radius: 20px; margin-bottom: 20px; }
        .energy-label { display: flex; justify-content: space-between; font-size: 14px; margin-bottom: 8px; }
        .progress-bg { background: #222; height: 10px; border-radius: 5px; overflow: hidden; }
        .progress-fill { background: linear-gradient(90deg, var(--accent), #00f2fe); height: 100%; width: 100%; transition: 0.2s; }

        /* উইথড্র উইন্ডো */
        .withdraw-overlay {
            position: absolute; inset: 0; background: rgba(0,0,0,0.95);
            display: none; flex-direction: column; justify-content: center;
            padding: 30px; z-index: 100; backdrop-filter: blur(20px);
        }
        .input-box { width: 100%; background: #1a1a1a; border: 1px solid #333; padding: 15px; color: white; border-radius: 12px; margin-bottom: 15px; }
        .btn-confirm { width: 100%; padding: 15px; background: linear-gradient(45deg, #00c853, #b2ff59); border: none; border-radius: 12px; font-weight: bold; font-size: 16px; color: #000; }

        .floating-amt { position: absolute; color: #fff; font-weight: bold; font-size: 24px; animation: moveUp 0.8s forwards; pointer-events: none; }
        @keyframes moveUp { 0% { opacity: 1; transform: translateY(0); } 100% { opacity: 0; transform: translateY(-120px); } }
    </style>
</head>
<body>

<div class="app-frame">
    <div class="profile-card">
        <div class="user-meta">
            <div class="avatar" id="user_avatar"><img src="https://via.placeholder.com/50" alt=""></div>
            <div>
                <div id="user_name" style="font-weight: bold; font-size: 15px;">Loading...</div>
                <div id="user_id" style="font-size: 10px; opacity: 0.6;">UID: 00000000</div>
            </div>
        </div>
        <button onclick="toggleWithdraw(true)" style="background: #e67e22; border: none; color: white; padding: 8px 18px; border-radius: 12px; font-weight: bold; cursor: pointer;">উইথড্র</button>
    </div>

    <div class="balance-board">
        <div class="balance-title">ব্যালেন্স (টাকা)</div>
        <div class="balance-val">৳ <span id="balance">0.00000</span></div>
        <div class="level-badge" id="levelName">Level 0: Starter</div>
    </div>

    <div class="main-tap-area">
        <div class="coin-wrapper">
            <div class="real-coin" id="tapButton"></div>
        </div>
    </div>

    <div class="status-container">
        <div class="energy-label">
            <span>⚡ এনার্জি: <span id="energyNum">1000</span>/1000</span>
            <span id="tapRate" style="color: var(--primary);">+0.00001</span>
        </div>
        <div class="progress-bg">
            <div class="progress-fill" id="energyBar"></div>
        </div>
    </div>

    <div class="withdraw-overlay" id="withdrawBox">
        <h2 style="text-align: center; color: var(--primary);">Cash Out</h2>
        <select class="input-box" id="method">
            <option value="bKash">বিকাশ (bKash)</option>
            <option value="Nagad">নগদ (Nagad)</option>
        </select>
        <input type="number" class="input-box" id="phone" placeholder="আপনার নম্বর">
        <input type="number" class="input-box" id="amount" placeholder="পরিমাণ (মিনিমাম ১০ টাকা)">
        <button class="btn-confirm" onclick="processWithdraw()">কনফার্ম করুন</button>
        <button onclick="toggleWithdraw(false)" style="background:none; border:none; color:#ff4444; width:100%; margin-top:15px; cursor:pointer;">বন্ধ করুন</button>
    </div>
</div>

<script>
    // Telegram API Integration
    const tg = window.Telegram.WebApp;
    tg.expand();
    const userData = tg.initDataUnsafe?.user;

    if (userData) {
        document.getElementById('user_name').innerText = userData.first_name + (userData.last_name ? " " + userData.last_name : "");
        document.getElementById('user_id').innerText = "UID: " + userData.id;
        if(userData.photo_url) document.getElementById('user_avatar').innerHTML = `<img src="${userData.photo_url}">`;
    }

    let currentBalance = 0.00000;
    let energy = 1000;
    let perTap = 0.00001;

    // লেভেল সিস্টেম লজিক
    function updateLevel() {
        let levelText = "Level 0: Starter";
        
        if (currentBalance >= 1000) { perTap = 0.01000; levelText = "Level 8: King 👑"; }
        else if (currentBalance >= 500) { perTap = 0.00500; levelText = "Level 7: Millionaire 💎"; }
        else if (currentBalance >= 300) { perTap = 0.00200; levelText = "Level 6: Master 🏆"; }
        else if (currentBalance >= 200) { perTap = 0.00100; levelText = "Level 5: Elite 🎖️"; }
        else if (currentBalance >= 100) { perTap = 0.00050; levelText = "Level 4: Professional 🚀"; }
        else if (currentBalance >= 30) { perTap = 0.00005; levelText = "Level 3: Advanced ⚡"; }
        else if (currentBalance >= 20) { perTap = 0.00003; levelText = "Level 2: Intermediate 🥉"; }
        else if (currentBalance >= 10) { perTap = 0.00002; levelText = "Level 1: Beginner 🥈"; }

        document.getElementById('levelName').innerText = levelText;
        document.getElementById('tapRate').innerText = "+" + perTap.toFixed(5);
    }

    const tapBtn = document.getElementById('tapButton');

    // ট্যাপ ফাংশন
    tapBtn.addEventListener('click', (e) => {
        if (energy >= 1) {
            currentBalance += perTap;
            energy -= 2;
            updateUI();
            updateLevel();
            if(tg.HapticFeedback) tg.HapticFeedback.impactOccurred('light');

            // অ্যানিমেশন
            const float = document.createElement('div');
            float.className = 'floating-amt';
            float.innerText = "+" + perTap.toFixed(5);
            float.style.left = e.clientX + 'px';
            float.style.top = e.clientY + 'px';
            document.body.appendChild(float);
            setTimeout(() => float.remove(), 800);
        }
    });

    function updateUI() {
        document.getElementById('balance').innerText = currentBalance.toFixed(5);
        document.getElementById('energyNum').innerText = energy;
        document.getElementById('energyBar').style.width = (energy / 1000 * 100) + "%";
    }

    setInterval(() => {
        if (energy < 1000) {
            energy = Math.min(1000, energy + 5);
            updateUI();
        }
    }, 1500);

    function toggleWithdraw(show) { document.getElementById('withdrawBox').style.display = show ? 'flex' : 'none'; }

    function processWithdraw() {
        const ph = document.getElementById('phone').value;
        const am = parseFloat(document.getElementById('amount').value);
        if (ph.length < 11 || am < 10) { tg.showAlert("সঠিক তথ্য দিন! (মিনিমাম ১০ টাকা)"); return; }
        if (am > currentBalance) { tg.showAlert("আপনার ব্যালেন্স পর্যাপ্ত নয়!"); return; }
        
        tg.showConfirm("আপনি কি নিশ্চিতভাবে উইথড্র রিকোয়েস্ট পাঠাতে চান?", (confirm) => {
            if(confirm) {
                tg.showAlert("সাকসেস! আপনার উইথড্র রিকোয়েস্ট পেন্ডিং আছে।");
                currentBalance -= am;
                updateUI();
                updateLevel();
                toggleWithdraw(false);
            }
        });
    }
</script>

</body>
</html>
