<link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700;800&family=JetBrains+Mono:wght@400;500&display=swap" rel="stylesheet">
<link href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css" rel="stylesheet">
<style>
        * { margin:0; padding:0; box-sizing:border-box; }
        body, html { height:100%; width:100%; background: linear-gradient(135deg, #0d1f0d, #1a3a1a); overflow:hidden; font-family: 'Inter', sans-serif; color:#fff; }
        /* Bright Moving Background */
        .neon-glow {
            position: fixed;
            top: 0; left: 0;
            width: 100%; height: 100%;
            background: 
                radial-gradient(circle at 20% 30%, rgba(0, 255, 0, 0.4) 0%, transparent 50%),
                radial-gradient(circle at 80% 70%, rgba(255, 255, 0, 0.4) 0%, transparent 50%),
                radial-gradient(circle at 50% 50%, rgba(0, 255, 100, 0.3) 0%, transparent 60%);
            animation: glowMove 20s infinite ease-in-out;
            z-index: 0;
            pointer-events: none;
        }
        @keyframes glowMove {
            0% { transform: translate(0, 0) rotate(0deg); }
            50% { transform: translate(10vw, -10vh) rotate(180deg); }
            100% { transform: translate(0, 0) rotate(360deg); }
        }
        /* Bright Grid Lines */
        .grid-bg {
            position: fixed;
            top: 0; left: 0;
            width: 100%; height: 100%;
            background-image: 
                linear-gradient(rgba(0, 255, 0, 0.15) 1px, transparent 1px),
                linear-gradient(90deg, rgba(0, 255, 0, 0.15) 1px, transparent 1px);
            background-size: 50px 50px;
            animation: gridScroll 30s linear infinite;
            z-index: 0;
            pointer-events: none;
        }
        @keyframes gridScroll {
            0% { background-position: 0 0; }
            100% { background-position: 50px 50px; }
        }
        /* Bright Particles */
        .particles {
            position: fixed;
            top: 0; left: 0;
            width: 100%; height: 100%;
            z-index: 0;
            pointer-events: none;
        }
        .particle {
            position: absolute;
            border-radius: 50%;
            background: radial-gradient(circle, rgba(0, 255, 0, 0.9), transparent);
            animation: float 20s infinite linear;
            box-shadow: 0 0 15px rgba(0, 255, 0, 0.8);
        }
        @keyframes float {
            0% { transform: translateY(100vh) translateX(0); opacity: 0; }
            10% { opacity: 1; }
            90% { opacity: 1; }
            100% { transform: translateY(-100px) translateX(30vw); opacity: 0; }
        }
        .container {
            position: fixed;
            top: 0; left: 0;
            width: 100%; height: 100%;
            z-index: 9999;
            display: flex;
            flex-direction: column;
            align-items: center;
            padding-top: 20px;
            overflow-y: auto;
            overflow-x: hidden;
        }
        .content {
            position: relative;
            z-index: 2;
            width: 95%;
            max-width: 500px;
            text-align: center;
            margin: 0 auto;
            padding: 10px;
        }
        /* HEADER */
        .header {
            margin-bottom: 25px;
            padding: 20px;
            border-radius: 20px;
            background: rgba(20, 50, 20, 0.9);
            backdrop-filter: blur(10px);
            border: 2px solid rgba(0, 255, 0, 0.5);
            box-shadow: 0 10px 30px rgba(0, 255, 0, 0.3);
        }
        .logo {
            display: flex;
            align-items: center;
            justify-content: center;
            margin-bottom: 10px;
            gap: 15px;
        }
        .logo-image {
            width: 80px;
            height: 80px;
            border-radius: 50%;
            border: 3px solid rgba(0, 255, 0, 0.8);
            overflow: hidden;
            box-shadow: 0 0 30px rgba(0, 255, 0, 0.7);
            animation: rotateLogo 10s linear infinite;
        }
        @keyframes rotateLogo {
            0% { transform: rotate(0deg); }
            100% { transform: rotate(360deg); }
        }
        .logo-image img {
            width: 100%;
            height: 100%;
            object-fit: cover;
        }
        .header h1 {
            font-weight: 800;
            font-size: 28px;
            background: linear-gradient(90deg, #00ff00, #ffff00, #00ff00);
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
            letter-spacing: 1px;
            text-shadow: 0 0 20px rgba(0, 255, 0, 0.5);
            animation: textGlow 2s infinite alternate;
        }
        @keyframes textGlow {
            0% { text-shadow: 0 0 20px rgba(0, 255, 0, 0.5); }
            100% { text-shadow: 0 0 30px rgba(0, 255, 0, 0.8), 0 0 40px rgba(0, 255, 0, 0.4); }
        }
        .header p {
            font-size: 16px;
            color: #ffff00;
            margin-top: 8px;
            font-weight: 700;
            text-shadow: 0 0 15px rgba(255, 255, 0, 0.8);
            letter-spacing: 1px;
        }
        /* FIREBASE LOGIN PAGE */
        .firebase-login-box {
            margin: 20px 0;
            padding: 30px 25px;
            border-radius: 20px;
            background: rgba(25, 60, 25, 0.95);
            backdrop-filter: blur(15px);
            border: 2px solid rgba(0, 255, 0, 0.6);
            box-shadow: 0 15px 40px rgba(0, 255, 0, 0.4);
            animation: pulse 3s infinite alternate;
        }
        @keyframes pulse {
            0% { box-shadow: 0 15px 40px rgba(0, 255, 0, 0.4); }
            100% { box-shadow: 0 15px 40px rgba(0, 255, 0, 0.7); }
        }
        .firebase-login-box h2 {
            font-size: 24px;
            margin-bottom: 20px;
            background: linear-gradient(90deg, #00ff00, #ffff00);
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
            font-weight: 700;
            text-shadow: 0 0 15px rgba(0, 255, 0, 0.5);
        }
        .firebase-login-box input {
            width: 100%;
            padding: 18px 20px;
            margin: 15px 0;
            border: none;
            border-radius: 12px;
            background: rgba(255, 255, 255, 0.15);
            color: #fff;
            font-size: 16px;
            font-weight: 500;
            text-align: center;
            outline: none;
            border: 2px solid rgba(0, 255, 0, 0.4);
            transition: all 0.3s ease;
            letter-spacing: 3px;
            font-family: 'JetBrains Mono', monospace;
        }
        .firebase-login-box input:focus {
            background: rgba(255, 255, 255, 0.2);
            border-color: #00ff00;
            box-shadow: 0 0 0 4px rgba(0, 255, 0, 0.5);
        }
        .firebase-login-box button {
            width: 100%;
            padding: 18px 20px;
            margin: 10px 0;
            border: none;
            border-radius: 12px;
            font-size: 16px;
            font-weight: 700;
            cursor: pointer;
            transition: all 0.3s ease;
            display: flex;
            align-items: center;
            justify-content: center;
            gap: 10px;
        }
        .unlock-btn {
            background: linear-gradient(135deg, #00ff00, #ffff00);
            color: #000;
            box-shadow: 0 5px 20px rgba(0, 255, 0, 0.5);
        }
        .unlock-btn:hover {
            background: linear-gradient(135deg, #00cc00, #cccc00);
            transform: translateY(-3px);
            box-shadow: 0 15px 30px rgba(0, 255, 0, 0.7);
        }
        .getkey-btn {
            background: rgba(255, 255, 255, 0.15);
            color: #00ff00;
            border: 2px solid rgba(0, 255, 0, 0.4);
        }
        .getkey-btn:hover {
            background: rgba(255, 255, 255, 0.2);
            color: #00ff00;
            transform: translateY(-3px);
            box-shadow: 0 5px 15px rgba(0, 255, 0, 0.4);
        }
        #firebaseMsgBox {
            margin-top: 15px;
            font-size: 14px;
            font-weight: 600;
            min-height: 20px;
            color: #ff4444;
            text-shadow: 0 0 10px rgba(255, 68, 68, 0.8);
        }
        /* Loading Overlay */
        .loading-overlay {
            position: fixed;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            background: rgba(0, 0, 0, 0.95);
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            z-index: 10000;
            opacity: 0;
            visibility: hidden;
            transition: all 0.3s;
        }
        .loading-overlay.active {
            opacity: 1;
            visibility: visible;
        }
        .loading-spinner {
            width: 80px;
            height: 80px;
            border: 5px solid transparent;
            border-top: 5px solid #00ff00;
            border-right: 5px solid #ffff00;
            border-radius: 50%;
            animation: spin 1s linear infinite;
            margin-bottom: 25px;
            box-shadow: 0 0 30px rgba(0, 255, 0, 0.8);
        }
        @keyframes spin {
            0% { transform: rotate(0deg); }
            100% { transform: rotate(360deg); }
        }
        .loading-text {
            color: #00ff00;
            font-size: 1.5rem;
            letter-spacing: 3px;
            text-transform: uppercase;
            text-shadow: 0 0 20px rgba(0, 255, 0, 0.8);
            animation: textPulse 1.5s infinite alternate;
        }
        @keyframes textPulse {
            0% { opacity: 0.7; }
            100% { opacity: 1; }
        }
        /* MAIN PANEL */
        .main {
            display: none;
            width: 100%;
            margin-top: 10px;
        }
        /* Time Display */
        .time-display {
            display: flex;
            justify-content: space-between;
            align-items: center;
            padding: 15px 20px;
            margin-bottom: 25px;
            border-radius: 15px;
            background: rgba(20, 50, 20, 0.8);
            border: 2px solid rgba(0, 255, 0, 0.4);
            box-shadow: 0 5px 15px rgba(0, 255, 0, 0.3);
        }
        .live-time {
            font-size: 22px;
            font-weight: 700;
            color: #00ff00;
            font-family: 'JetBrains Mono', monospace;
            text-shadow: 0 0 10px rgba(0, 255, 0, 0.8);
        }
        .server-status {
            display: flex;
            align-items: center;
            gap: 8px;
            font-size: 14px;
            color: #ffff00;
            font-weight: 600;
            text-shadow: 0 0 10px rgba(255, 255, 0, 0.8);
        }
        .status-dot {
            width: 10px;
            height: 10px;
            border-radius: 50%;
            background-color: #ffff00;
            animation: blink 2s infinite;
            box-shadow: 0 0 10px rgba(255, 255, 0, 0.8);
        }
        @keyframes blink {
            0%, 100% { opacity: 1; }
            50% { opacity: 0.5; }
        }
        /* Timer */
        .timer-container {
            position: relative;
            width: 180px;
            height: 180px;
            margin: 0 auto 15px;
        }
        .timer-circle {
            position: relative;
            width: 100%;
            height: 100%;
            border-radius: 50%;
            display: flex;
            align-items: center;
            justify-content: center;
            background: conic-gradient(#00ff00 calc(var(--progress) * 1%), rgba(0, 255, 0, 0.2) calc(var(--progress) * 1%));
            box-shadow: 
                0 0 50px rgba(0, 255, 0, 0.8),
                inset 0 0 30px rgba(0, 0, 0, 0.5);
            border: 3px solid rgba(0, 255, 0, 0.5);
            transition: background 0.5s ease;
        }
        .timer-text {
            font-size: 36px;
            font-weight: 800;
            color: #ffff00;
            text-shadow: 0 0 20px rgba(255, 255, 0, 1);
        }
        .timer-label {
            text-align: center;
            font-size: 14px;
            color: #00ff00;
            margin-bottom: 25px;
            font-weight: 600;
            text-shadow: 0 0 10px rgba(0, 255, 0, 0.8);
        }
        /* Signal Container */
        .signal-container {
            margin-bottom: 25px;
        }
        .signal-box {
            padding: 20px;
            border-radius: 15px;
            background: rgba(25, 60, 25, 0.9);
            border: 2px solid rgba(0, 255, 0, 0.4);
            box-shadow: 0 5px 15px rgba(0, 255, 0, 0.3);
            transition: all 0.5s ease;
        }
        .signal-label {
            font-size: 14px;
            color: #00ff00;
            margin-bottom: 10px;
            font-weight: 600;
            text-shadow: 0 0 10px rgba(0, 255, 0, 0.8);
        }
        .signal-value {
            font-size: 48px;
            font-weight: 900;
            letter-spacing: 2px;
            transition: all 0.5s ease;
        }
        .signal-big {
            color: #00ff00;
            text-shadow: 0 0 25px rgba(0, 255, 0, 1);
        }
        .signal-small {
            color: #ffff00;
            text-shadow: 0 0 25px rgba(255, 255, 0, 1);
        }
        .signal-wait {
            color: #ff4444;
            text-shadow: 0 0 25px rgba(255, 68, 68, 1);
            animation: waitPulse 1.5s infinite alternate;
        }
        @keyframes waitPulse {
            0% { opacity: 0.7; transform: scale(1); }
            100% { opacity: 1; transform: scale(1.05); }
        }
        /* Numbers Box */
        .numbers-box {
            padding: 20px;
            margin-bottom: 25px;
            border-radius: 15px;
            background: rgba(25, 60, 25, 0.9);
            border: 2px solid rgba(0, 255, 0, 0.4);
            box-shadow: 0 5px 15px rgba(0, 255, 0, 0.3);
        }
        .numbers-display {
            display: flex;
            justify-content: center;
            gap: 20px;
            margin-top: 15px;
        }
        .number {
            width: 80px;
            height: 80px;
            border-radius: 50%;
            display: flex;
            align-items: center;
            justify-content: center;
            font-size: 36px;
            font-weight: 900;
            background: linear-gradient(135deg, #00ff00, #ffff00);
            color: #000;
            box-shadow: 0 0 30px rgba(0, 255, 0, 0.8);
            animation: numberPulse 2s infinite;
            border: 2px solid rgba(255, 255, 255, 0.3);
            transition: all 0.3s ease;
        }
        @keyframes numberPulse {
            0% { transform: scale(1); box-shadow: 0 0 30px rgba(0, 255, 0, 0.8); }
            50% { transform: scale(1.05); box-shadow: 0 0 40px rgba(0, 255, 0, 1); }
            100% { transform: scale(1); box-shadow: 0 0 30px rgba(0, 255, 0, 0.8); }
        }
        /* History Container */
        .history-container {
            margin-bottom: 25px;
            border-radius: 15px;
            overflow: hidden;
            border: 2px solid rgba(0, 255, 0, 0.4);
            background: rgba(25, 60, 25, 0.9);
        }
        .history-header {
            padding: 15px 20px;
            background: rgba(0, 255, 0, 0.2);
            border-bottom: 2px solid rgba(0, 255, 0, 0.4);
        }
        .history-header h3 {
            font-size: 18px;
            color: #00ff00;
            font-weight: 700;
            text-shadow: 0 0 10px rgba(0, 255, 0, 0.8);
        }
        .history-box {
            max-height: 250px;
            overflow-y: auto;
            padding: 10px;
        }
        .history-table {
            width: 100%;
            border-collapse: collapse;
        }
        .history-table th {
            padding: 12px 10px;
            text-align: left;
            font-size: 13px;
            color: #00ff00;
            border-bottom: 2px solid rgba(0, 255, 0, 0.4);
            font-weight: 700;
            text-shadow: 0 0 10px rgba(0, 255, 0, 0.8);
        }
        .history-table td {
            padding: 12px 10px;
            border-bottom: 1px solid rgba(0, 255, 0, 0.2);
            font-size: 14px;
            transition: all 0.3s ease;
        }
        .history-table tr:hover td {
            background: rgba(0, 255, 0, 0.2);
            transform: translateX(5px);
        }
        .signal-badge {
            padding: 5px 12px;
            border-radius: 20px;
            font-size: 12px;
            font-weight: 700;
            display: inline-block;
            min-width: 70px;
            text-align: center;
        }
        .badge-big {
            background: rgba(0, 255, 0, 0.3);
            color: #00ff00;
            box-shadow: 0 0 10px rgba(0, 255, 0, 0.5);
        }
        .badge-small {
            background: rgba(255, 255, 0, 0.3);
            color: #ffff00;
            box-shadow: 0 0 10px rgba(255, 255, 0, 0.5);
        }
        /* Period Display */
        .period-container {
            padding: 15px;
            margin-bottom: 20px;
            border-radius: 15px;
            background: rgba(20, 50, 20, 0.8);
            border: 2px solid rgba(0, 255, 0, 0.4);
            box-shadow: 0 5px 15px rgba(0, 255, 0, 0.3);
        }
        .period-display {
            font-family: 'JetBrains Mono', monospace;
            font-size: 20px;
            font-weight: 700;
            color: #ffff00;
            text-shadow: 0 0 10px rgba(255, 255, 0, 0.8);
            letter-spacing: 2px;
        }
        .period-label {
            font-size: 14px;
            color: #00ff00;
            margin-bottom: 8px;
            font-weight: 600;
            text-shadow: 0 0 10px rgba(0, 255, 0, 0.8);
        }
        /* Scrollbar */
        .history-box::-webkit-scrollbar {
            width: 6px;
        }
        .history-box::-webkit-scrollbar-track {
            background: rgba(0, 255, 0, 0.1);
        }
        .history-box::-webkit-scrollbar-thumb {
            background: #00ff00;
            border-radius: 3px;
            box-shadow: 0 0 5px rgba(0, 255, 0, 0.8);
        }
        .history-box::-webkit-scrollbar-thumb:hover {
            background: #00cc00;
        }
        /* Channel Button */
        .channel-btn {
            display: block;
            width: 100%;
            padding: 18px 20px;
            margin-bottom: 30px;
            background: linear-gradient(135deg, #00ff00, #ffff00);
            color: #000;
            border: none;
            border-radius: 12px;
            font-size: 16px;
            font-weight: 700;
            text-decoration: none;
            cursor: pointer;
            transition: all 0.3s ease;
            box-shadow: 0 10px 30px rgba(0, 255, 0, 0.6);
            display: flex;
            align-items: center;
            justify-content: center;
            gap: 10px;
        }
        .channel-btn:hover {
            transform: translateY(-3px);
            box-shadow: 0 15px 40px rgba(0, 255, 0, 0.8);
        }
        /* Responsive */
        @media (max-width: 480px) {
            .content {
                width: 98%;
                max-width: 98%;
                padding: 5px;
            }
            .header h1 {
                font-size: 22px;
            }
            .logo-image {
                width: 60px;
                height: 60px;
            }
            .timer-container {
                width: 150px;
                height: 150px;
            }
            .timer-text {
                font-size: 30px;
            }
            .signal-value {
                font-size: 40px;
            }
            .number {
                width: 70px;
                height: 70px;
                font-size: 32px;
            }
            .history-box {
                max-height: 220px;
            }
            .period-display {
                font-size: 16px;
            }
        }
</style>
</head>

        const firebaseLoginBox = document.getElementById('firebaseLoginBox');
        const mainPanel = document.getElementById('mainPanel');
        const firebaseKeyInput = document.getElementById('firebaseKeyInput');
        const firebaseMsgBox = document.getElementById('firebaseMsgBox');
        const liveTime = document.getElementById('liveTime');
        const periodDisplay = document.getElementById('periodDisplay');
        const timerCircle = document.getElementById('timerCircle');
        const timerText = document.getElementById('timerText');
        const signalType = document.getElementById('signalType');
        const num1 = document.getElementById('num1');
        const num2 = document.getElementById('num2');
        const historyTable = document.getElementById('historyTable').getElementsByTagName('tbody')[0];
        const loadingOverlay = document.getElementById('loadingOverlay');
        // Create particles
        function createParticles() {
            const particlesContainer = document.getElementById('particles');
            particlesContainer.innerHTML = '';
            for (let i = 0; i 
< 20; i++) {
                const particle = document.createElement('div');
                particle.className = 'particle';
                const size = Math.random() * 10 + 5;
                const left = Math.random() * 100;
                const top = Math.random() * 100;
                const duration = Math.random() * 10 + 15;
                const delay = Math.random() * 5;
                particle.style.width = `${size}px`;
                particle.style.height = `${size}px`;
                particle.style.left = `${left}%`;
                particle.style.top = `${top}%`;
                particle.style.animationDuration = `${duration}s`;
                particle.style.animationDelay = `${delay}s`;
                particlesContainer.appendChild(particle);
            }
        }
        // Initialize particles
        createParticles();
        // Update live time
        function updateLiveTime() {
            const now = new Date();
            const timeString = now.toLocaleTimeString('en-US', { 
                hour12: false,
                hour: '2-digit',
                minute: '2-digit',
                second: '2-digit'
            });
            liveTime.textContent = timeString;
        }
        // Update period display
        function updatePeriod() {
            const now = new Date();
            const year = now.getFullYear();
            const month = String(now.getMonth() + 1).padStart(2, '0');
            const day = String(now.getDate()).padStart(2, '0');
            const hour = now.getHours();
            const minute = now.getMinutes();
            const totalMinutes = hour * 60 + minute;
            const period = `${year}${month}${day}1000${10001 + totalMinutes}`;
            periodDisplay.textContent = period;
        }
        // Update timer
        function updateTimer() {
            const now = new Date();
            const seconds = now.getSeconds();
            const remainingSeconds = 60 - seconds;
            // Update timer text
            timerText.textContent = `${remainingSeconds}s`;
            // Update progress circle
            const progress = ((60 - remainingSeconds) / 60) * 100;
            timerCircle.style.setProperty('--progress', progress);
            // Change color based on remaining time
            if (remainingSeconds 
<= 10) {
                timerCircle.style.background = `conic-gradient(#ff4444 calc(${progress} * 1%), rgba(255, 68, 68, 0.2) calc(${progress} * 1%))`;
                timerText.style.color = '#ff4444';
                timerText.style.textShadow = '0 0 20px rgba(255, 68, 68, 1)';
            } else if (remainingSeconds 
<= 30) {
                timerCircle.style.background = `conic-gradient(#ffff00 calc(${progress} * 1%), rgba(255, 255, 0, 0.2) calc(${progress} * 1%))`;
                timerText.style.color = '#ffff00';
                timerText.style.textShadow = '0 0 20px rgba(255, 255, 0, 1)';
            } else {
                timerCircle.style.background = `conic-gradient(#00ff00 calc(${progress} * 1%), rgba(0, 255, 0, 0.2) calc(${progress} * 1%))`;
                timerText.style.color = '#ffff00';
                timerText.style.textShadow = '0 0 20px rgba(255, 255, 0, 1)';
            }
            // Check if it's time to generate new signal
            if (remainingSeconds === 60 || remainingSeconds === 0) {
                generateNewSignal();
            }
        }
        // Show loading animation
        function showLoadingAnimation() {
            loadingOverlay.classList.add('active');
            // Change loading text randomly
            const loadingTexts = [
                "GENERATING SIGNAL...",
                "ANALYZING MARKET...",
                "CALCULATING NUMBERS...",
                "PREDICTING RESULT...",
                "PROCESSING DATA..."
            ];
            const randomText = loadingTexts[Math.floor(Math.random() * loadingTexts.length)];
            loadingOverlay.querySelector('.loading-text').textContent = randomText;
            // Change spinner color randomly
            const colors = ['#00ff00', '#ffff00', '#ff4444', '#00ffff', '#ff00ff'];
            const randomColor = colors[Math.floor(Math.random() * colors.length)];
            loadingOverlay.querySelector('.loading-spinner').style.borderTopColor = randomColor;
            loadingOverlay.querySelector('.loading-spinner').style.borderRightColor = randomColor;
            loadingOverlay.querySelector('.loading-text').style.color = randomColor;
            // Hide after 1 second
            setTimeout(() =>
 {
                loadingOverlay.classList.remove('active');
            }, 1000);
        }
        // Prediction Map
        const predictionMap = {
            "(0,0)": "BIG", "(0,1)": "BIG", "(0,2)": "BIG", "(0,3)": "BIG",
            "(0,4)": "SMALL", "(0,5)": "SMALL", "(0,6)": "BIG", "(0,7)": "SMALL",
            "(0,8)": "SMALL", "(0,9)": "BIG",
            "(1,0)": "BIG", "(1,1)": "BIG", "(1,2)": "BIG", "(1,3)": "SMALL",
            "(1,4)": "SMALL", "(1,5)": "SMALL", "(1,6)": "BIG", "(1,7)": "SMALL",
            "(1,8)": "BIG", "(1,9)": "BIG",
            "(2,0)": "SMALL", "(2,1)": "BIG", "(2,2)": "BIG", "(2,3)": "BIG",
            "(2,4)": "SMALL", "(2,5)": "BIG", "(2,6)": "SMALL", "(2,7)": "BIG",
            "(2,8)": "SMALL", "(2,9)": "SMALL",
            "(3,0)": "SMALL", "(3,1)": "BIG", "(3,2)": "BIG", "(3,3)": "SMALL",
            "(3,4)": "BIG", "(3,5)": "SMALL", "(3,6)": "BIG", "(3,7)": "BIG",
            "(3,8)": "SMALL", "(3,9)": "SMALL",
            "(4,0)": "BIG", "(4,1)": "SMALL", "(4,2)": "SMALL", "(4,3)": "BIG",
            "(4,4)": "SMALL", "(4,5)": "BIG", "(4,6)": "SMALL", "(4,7)": "BIG",
            "(4,8)": "BIG", "(4,9)": "SMALL",
            "(5,0)": "SMALL", "(5,1)": "BIG", "(5,2)": "BIG", "(5,3)": "SMALL",
            "(5,4)": "SMALL", "(5,5)": "BIG", "(5,6)": "BIG", "(5,7)": "SMALL",
            "(5,8)": "BIG", "(5,9)": "BIG",
            "(6,0)": "SMALL", "(6,1)": "SMALL", "(6,2)": "SMALL", "(6,3)": "BIG",
            "(6,4)": "SMALL", "(6,5)": "BIG", "(6,6)": "BIG", "(6,7)": "SMALL",
            "(6,8)": "BIG", "(6,9)": "BIG",
            "(7,0)": "BIG", "(7,1)": "BIG", "(7,2)": "BIG", "(7,3)": "SMALL",
            "(7,4)": "BIG", "(7,5)": "SMALL", "(7,6)": "BIG", "(7,7)": "SMALL",
            "(7,8)": "BIG", "(7,9)": "SMALL",
            "(8,0)": "SMALL", "(8,1)": "BIG", "(8,2)": "BIG", "(8,3)": "BIG",
            "(8,4)": "SMALL", "(8,5)": "SMALL", "(8,6)": "BIG", "(8,7)": "SMALL",
            "(8,8)": "BIG", "(8,9)": "BIG",
            "(9,0)": "SMALL", "(9,1)": "BIG", "(9,2)": "BIG", "(9,3)": "SMALL",
            "(9,4)": "BIG", "(9,5)": "SMALL", "(9,6)": "SMALL", "(9,7)": "SMALL",
            "(9,8)": "BIG", "(9,9)": "BIG"
        };
        // Generate new signal
        function generateNewSignal() {
            showLoadingAnimation();
            setTimeout(() =>
 {
                // Generate random numbers
                const lastNum = Math.floor(Math.random() * 10);
                const belowNum = Math.floor(Math.random() * 10);
                // Get prediction from map
                const predictionKey = `(${lastNum},${belowNum})`;
                const signal = predictionMap[predictionKey] || (Math.random() >
 0.5 ? "BIG" : "SMALL");
                // Update signal display
                signalType.textContent = signal;
                signalType.className = `signal-value signal-${signal.toLowerCase()}`;
                // Update numbers
                num1.textContent = lastNum;
                num2.textContent = belowNum;
                // Add to history
                addToHistory(signal, lastNum, belowNum);
                // Change signal box border color randomly
                const colors = ['#00ff00', '#ffff00', '#ff4444', '#00ffff', '#ff00ff', '#ff8800'];
                const randomColor = colors[Math.floor(Math.random() * colors.length)];
                document.querySelector('.signal-box').style.borderColor = randomColor;
                document.querySelector('.signal-box').style.boxShadow = `0 5px 15px ${randomColor}80`;
            }, 1000);
        }
        // Add to history
        function addToHistory(signal, num1Val, num2Val) {
            const now = new Date();
            const timeString = now.toLocaleTimeString('en-US', { 
                hour12: false,
                hour: '2-digit',
                minute: '2-digit',
                second: '2-digit'
            });
            const newRow = historyTable.insertRow(0);
            newRow.innerHTML = `
<td>
${timeString}
</td>
<td>
<span class="signal-badge badge-${signal.toLowerCase()}">
${signal}
</span>
</td>
<td>
${num1Val} | ${num2Val}
</td>
            `;
            // Keep only last 10 records
            if (historyTable.rows.length >
 10) {
                historyTable.deleteRow(10);
            }
        }
        // Check Firebase key
        function checkFirebaseKey() {
            const enteredKey = firebaseKeyInput.value.trim();
            if (enteredKey === CORRECT_PASSWORD) {
                // Correct password
                firebaseMsgBox.textContent = "✅ ACCESS GRANTED! LOADING SYSTEM...";
                firebaseMsgBox.style.color = "#00ff00";
                // Show loading animation
                showLoadingAnimation();
                // Switch to main panel after 1.5 seconds
                setTimeout(() =>
 {
                    firebaseLoginBox.style.display = 'none';
                    mainPanel.style.display = 'block';
                    // Initialize system
                    updateLiveTime();
                    updatePeriod();
                    updateTimer();
                    generateNewSignal();
                    // Start intervals
                    setInterval(updateLiveTime, 1000);
                    setInterval(updatePeriod, 1000);
                    setInterval(updateTimer, 1000);
                    signalInterval = setInterval(generateNewSignal, ONE_MINUTE_MS);
                    // Auto-focus on input
                    firebaseKeyInput.blur();
                }, 1500);
            } else {
                // Wrong password
                firebaseMsgBox.textContent = "❌ WRONG ACCESS KEY! REDIRECTING TO TELEGRAM...";
                firebaseMsgBox.style.color = "#ff4444";
                firebaseKeyInput.value = "";
                // Redirect to Telegram after 1 second
                setTimeout(() =>
 {
                    window.open(REDIRECT_TELEGRAM_URL, '_blank');
                }, 1000);
            }
        }
        // Enter key support
        firebaseKeyInput.addEventListener('keypress', function(e) {
            if (e.key === 'Enter') {
                checkFirebaseKey();
            }
        });
        // Auto-focus on input
        setTimeout(() =>
 {
            firebaseKeyInput.focus();
        }, 1000);
        // Initial setup
        updateLiveTime();
        updatePeriod();
</script>
</body>
